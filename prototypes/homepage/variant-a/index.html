<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage — Minimal</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; background: #fff; color: #111; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid #eee; }
    nav a { text-decoration: none; color: inherit; font-size: 14px; }
    .logo { font-weight: 700; font-size: 18px; }
    .hero { padding: 120px 40px; max-width: 640px; }
    .hero h1 { font-size: 48px; font-weight: 700; line-height: 1.1; margin-bottom: 20px; }
    .hero p { font-size: 18px; color: #555; line-height: 1.6; margin-bottom: 32px; }
    .cta { display: inline-block; background: #111; color: #fff; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 15px; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">Acme</span>
    <div style="display:flex;gap:24px">
      <a href="#">Product</a>
      <a href="#">Pricing</a>
      <a href="#">Docs</a>
    </div>
  </nav>
  <section class="hero">
    <h1>Build faster,<br>ship better.</h1>
    <p>The platform that gets out of your way and lets your team focus on what matters.</p>
    <a href="#" class="cta">Get started free</a>
  </section>
</body>
</html>
