<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage — Bold</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; }
    nav a { text-decoration: none; color: #aaa; font-size: 14px; }
    .logo { font-weight: 700; font-size: 18px; color: #fff; }
    .hero { padding: 120px 40px; text-align: center; }
    .hero h1 { font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 24px; background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { font-size: 20px; color: #888; line-height: 1.6; margin-bottom: 40px; max-width: 480px; margin-left: auto; margin-right: auto; }
    .cta-row { display: flex; gap: 12px; justify-content: center; }
    .cta { display: inline-block; background: #fff; color: #000; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: 600; }
    .cta-ghost { display: inline-block; border: 1px solid #333; color: #fff; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 15px; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">Acme</span>
    <div style="display:flex;gap:24px">
      <a href="#">Product</a>
      <a href="#">Pricing</a>
      <a href="#">Docs</a>
    </div>
  </nav>
  <section class="hero">
    <h1>Build the future.</h1>
    <p>The platform built for teams who move fast and don't break things.</p>
    <div class="cta-row">
      <a href="#" class="cta">Start for free</a>
      <a href="#" class="cta-ghost">See the demo</a>
    </div>
  </section>
</body>
</html>
